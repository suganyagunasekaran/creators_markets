name: creator_marketplace

description: Creator Marketplace Assessment

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  go_router: ^16.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  timeline_tile: ^2.0.0
  intl: ^0.20.2

  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
    android: true
    ios: true
    image_path: assets/icon/app_icon.png